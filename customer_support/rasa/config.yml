recipe: default.v1
language: en

pipeline:
  - name: WhitespaceTokenizer
  - name: RegexFeaturizer
  - name: LexicalSyntacticFeaturizer
  - name: CountVectorsFeaturizer
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 3
    max_ngram: 5
  - name: DIETClassifier
    epochs: 80
  - name: EntitySynonymMapper
  - name: ResponseSelector
    epochs: 50

policies:
  - name: RulePolicy
  - name: TEDPolicy
    max_history: 8
    epochs: 80
